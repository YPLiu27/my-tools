<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/main.js"></script>
  <link rel="stylesheet" href="fonts/css/all.css">
  <link rel="stylesheet" href="css/root.css">
  <title>全能工具箱 - 導航首頁</title>
  <style>
    .container {
      max-width: 900px;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      padding: 10px 15px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 50px;
    }

    .tool-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    /* 連結樣式 */
    .tool-card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      text-align: left;
      transition: 0.3s;
      height: 100%;
    }

    .tool-link {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
      padding: 25px;
      transition: .3s;
    }

    .tool-card:hover {
      border-color: var(--primary);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .tool-card:hover a {
      transform: translateY(-5px);
    }

    .tool-card .icon {
      font-size: 32px;
      margin-bottom: 15px;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h3 {
      margin: 0 0 10px 0;
    }

    p {
      font-size: 14px;
      color: #888;
    }

    @media (max-width:768px) {
      .tool-link{display: grid; grid-template-columns: 70px 1fr;}
      .tool-card .icon{grid-row: 1 / span 2; display: flex; justify-content: center; align-items: center; align-content: center; margin: 0;}
    }
  </style>
</head>

<body class="indexPage">


  <div class="container">
    <h1>全能工具箱</h1>
    <p>點選下方工具開始使用</p>

    <div class="tool-grid">
      <div class="tool-card">
        <a href="tools/webpChange.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-file-image"></i></span>
          <h3>圖片轉 WebP</h3>
          <p>支援批次轉檔與 HEIC 格式。</p>
        </a>
      </div>
      <div class="tool-card">
        <a href="tools/compressor.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-image"></i></span>
          <h3>圖片壓縮工具</h3>
          <p>縮小 JPG/PNG 檔案體積，支援批量處理。</p>
        </a>
      </div>
      <!-- <div class="tool-card">
        <a href="tools/imgResize.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-image"></i></span>
          <h3>圖片尺寸調整</h3>
          <p>自定義長度與複雜度，離線生成安全隨機密碼。</p>
        </a>
      </div> -->
      <div class="tool-card">
        <a href="tools/password.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-lock"></i></span>
          <h3>密碼產生器</h3>
          <p>自由設定圖片寬度與高度，保持比例不失真。</p>
        </a>
      </div>
      <div class="tool-card">
        <a href="tools/windowCheck.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-font"></i></span>
          <h3>字體預覽工具</h3>
          <p>自由設定字體大小行高，檢視目前瀏覽器呈現狀態</p>
        </a>
      </div>
      <div class="tool-card">
        <a href="tools/textChange.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-arrow-right-arrow-left"></i></span>
          <h3>字體單位換算</h3>
        </a>
      </div>
      <div class="tool-card">
        <a href="tools/colorSet.html" class="tool-link">
          <span class="icon"><i class="fa-solid fa-palette"></i></span>
          <h3>顏色選取器</h3>
          <p>提供 HEX, RGBA 轉換，並支援調色盤配色建議。</p>
        </a>
      </div>
    </div>
  </div>
</body>

</html>
