<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片壓縮工具 - 工具箱</title>
  <script src="../js/jquery-3.3.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="../js/main.js"></script>
  <link rel="stylesheet" href="../fonts/css/all.css">
  <link rel="stylesheet" href="../css/root.css">
  <style>
    .container {
      max-width: 600px;
    }

    .back-link {
      display: block;
      margin-bottom: 20px;
      color: var(--primary);
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 20px;
      cursor: pointer;
      background: var(--drop-bg);
      margin-bottom: 20px;
      transition: 0.3s;
    }

    #drop-zone:hover {
      border-color: var(--primary);
      background: #3b82f61a;
    }

    .controls {
      background: var(--drop-bg);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    .file-list {
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .file-item {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .size-info {
      color: #888;
      font-size: 11px;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container">
      <h2><i class="fa-solid fa-image"></i> 圖片壓縮工具</h2>
      <p style="font-size: 14px; color: #888; margin-bottom: 20px;">支援 JPG / PNG 批量壓縮</p>

    <div class="card">

      <div id="drop-zone" onclick="document.getElementById('f').click()">
        <p>拖曳圖片至此，或點擊選擇</p>
        <input type="file" id="f" multiple accept="image/jpeg,image/png" hidden>
      </div>

      <div class="controls">
        <div class="slider-label">
          <span>壓縮品質 (Quality)</span>
          <span id="qLabel">70%</span>
        </div>
        <input type="range" id="quality" min="0.1" max="1.0" step="0.05" value="0.7">
        <p style="font-size: 11px; color: #888; margin-top: 10px; text-align: left;">提示：數值越低，檔案越小，但畫質會下降。</p>
      </div>

      <div class="file-list" id="fileList"></div>
      <button id="compBtn" disabled>開始壓縮並下載 ZIP</button>
    </div>
  </div>

  <canvas id="canvas" style="display: none;"></canvas>

  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    const fInput = document.getElementById('f');
    const qInput = document.getElementById('quality');
    const qLabel = document.getElementById('qLabel');
    const fileList = document.getElementById('fileList');
    const compBtn = document.getElementById('compBtn');
    let selectedFiles = [];

    qInput.oninput = (e) => qLabel.innerText = Math.round(e.target.value * 100) + '%';

    fInput.onchange = (e) => handleFiles(e.target.files);

    // 拖曳處理
    const dz = document.getElementById('drop-zone');
    dz.ondragover = (e) => { e.preventDefault(); dz.style.borderColor = "#3b82f6"; };
    dz.ondragleave = () => dz.style.borderColor = "";
    dz.ondrop = (e) => { e.preventDefault(); dz.style.borderColor = ""; handleFiles(e.dataTransfer.files); };

    function handleFiles(files) {
      selectedFiles = Array.from(files).filter(f => f.type.match('image.*'));
      if (selectedFiles.length > 0) {
        fileList.innerHTML = selectedFiles.map(f => `
                <div class="file-item">
                    <span>${f.name}</span>
                    <span class="size-info">${(f.size / 1024).toFixed(1)} KB</span>
                </div>
            `).join('');
        fileList.style.display = 'block';
        compBtn.disabled = false;
      }
    }

    compBtn.onclick = async () => {
      compBtn.innerText = '壓縮中...';
      compBtn.disabled = true;
      const zip = new JSZip();
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const quality = parseFloat(qInput.value);

      for (let file of selectedFiles) {
        const img = await createImageBitmap(file);
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        // 壓縮邏輯：統一轉為 jpeg 輸出以達到壓縮效果
        // 如果是 PNG 且想保持透明度，壓縮率通常不高，故此工具優先以體積優化為主
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
        zip.file(file.name.replace(/\.[^/.]+$/, "") + "_min.jpg", blob);
      }

      const content = await zip.generateAsync({ type: "blob" });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = "compressed_images.zip";
      link.click();

      compBtn.innerText = '開始壓縮並下載 ZIP';
      compBtn.disabled = false;
    };
  </script>
</body>

</html>
