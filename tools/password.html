<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全密碼產生器 - 工具箱</title>
    <link rel="stylesheet" href="../fonts/css/all.css">
  <link rel="stylesheet" href="../css/root.css">
  <style>
    .container {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }

    .back-link {
      display: block;
      margin-bottom: 20px;
      color: var(--primary);
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .result-box {
      background: var(--drop-bg);
      padding: 20px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 24px;
      margin-bottom: 20px;
      word-break: break-all;
      border: 1px dashed var(--primary);
      color: var(--primary);
    }

    .controls-group {
      background: var(--drop-bg);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      text-align: left;
    }

    .setting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    input[type="range"] {
      flex: 1;
      margin: 0 10px;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  
  <div class="theme-toggle" id="themeBtn"><i class="fa-solid fa-circle-half-stroke"></i> 模式切換</div>
  <div class="container">
    <a href="../index.html" class="back-link">← 返回首頁工具列表</a>
    <div class="card">
      <h2><i class="fa-solid fa-lock"></i> 密碼產生器</h2>
      <div class="result-box" id="pwBox">P@ssw0rd123</div>
      <div class="controls-group">
        <div class="setting">
          <label>長度: <span id="lenLabel">16</span></label>
          <input type="range" id="pwLen" min="6" max="64" value="16">
        </div>
      </div>
      <div class="controls-group">
        <div class="setting"><label>包含大寫字母 (A-Z)</label><input type="checkbox" id="upper" checked></div>
        <div class="setting"><label>包含數字 (0-9)</label><input type="checkbox" id="num" checked></div>
        <div class="setting"><label>包含符號 (!@#$)</label><input type="checkbox" id="sym" checked></div>
      </div>
      <button onclick="gen()">生成並複製</button>
    </div>
  </div>
  
<script>
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    if (localStorage.getItem('theme') === 'dark') html.setAttribute('data-theme', 'dark');
    themeBtn.onclick = () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        isDark ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    };
</script>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    const lenInput = document.getElementById('pwLen');
    lenInput.oninput = () => document.getElementById('lenLabel').innerText = lenInput.value;

    function gen() {
      const charset = "abcdefghijklmnopqrstuvwxyz" +
        (document.getElementById('upper').checked ? "ABCDEFGHIJKLMNOPQRSTUVWXYZ" : "") +
        (document.getElementById('num').checked ? "0123456789" : "") +
        (document.getElementById('sym').checked ? "!@#$%^&*()_+~`|}{[]:;?><,./-=" : "");
      let res = "";
      for (let i = 0; i < lenInput.value; i++) res += charset.charAt(Math.floor(Math.random() * charset.length));
      document.getElementById('pwBox').innerText = res;
      navigator.clipboard.writeText(res);
    }
  </script>
</body>

</html>
