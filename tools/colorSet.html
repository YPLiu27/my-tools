<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色選取器 (含透明度) - 工具箱</title>
    <link rel="stylesheet" href="../fonts/css/all.css">
    <link rel="stylesheet" href="../css/root.css">
    <style>
        
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .back-link { display: block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 顏色預覽區 (加上棋盤背影以顯示透明效果) */
        .preview-container {
            width: 100%; height: 120px; border-radius: 12px; margin-bottom: 20px;
            position: relative; overflow: hidden; border: 4px solid var(--card-bg);
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .color-layer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 150%; height: 150%; cursor: pointer; opacity: 0; }

        /* 滑桿樣式 */
        .slider-group { background: var(--drop-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .slider-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; }

        /* 編碼列表 */
        .code-item {
            background: var(--drop-bg); padding: 12px 15px; border-radius: 10px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid var(--border);
        }
        .code-label { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; width: 45px; }
        .code-value { font-family: monospace; font-size: 14px; flex: 1; margin-left: 10px; text-align: left; }
        .code-item button { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; width: auto;}
        .code-item button:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="theme-toggle" id="themeBtn"><i class="fa-solid fa-circle-half-stroke"></i> 模式切換</div>
<div class="container">
    <a href="../index.html" class="back-link">← 返回首頁工具列表</a>
    
    <div class="card">
        <h2><i class="fa-solid fa-palette"></i> 顏色選取器 (含透明度)</h2>
        
        <div class="preview-container">
            <div class="color-layer" id="colorLayer" style="background-color: rgba(59, 130, 246, 1);"></div>
            <input type="color" id="picker" value="#3b82f6">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>透明度 (Alpha)</span>
                <span id="alphaLabel">100%</span>
            </div>
            <input type="range" id="alphaRange" min="0" max="100" value="100">
        </div>

        <div class="result-group">
            <div class="code-item">
                <span class="code-label">Hex</span>
                <span class="code-value" id="hex">#3B82F6FF</span>
                <button class="copy-btn" onclick="copy('hex')">複製</button>
            </div>
            <div class="code-item">
                <span class="code-label">RGBA</span>
                <span class="code-value" id="rgba">rgba(59, 130, 246, 1)</span>
                <button class="copy-btn" onclick="copy('rgba')">複製</button>
            </div>
            <div class="code-item">
                <span class="code-label">HSLA</span>
                <span class="code-value" id="hsla">hsla(217, 91%, 60%, 1)</span>
                <button class="copy-btn" onclick="copy('hsla')">複製</button>
            </div>
        </div>
    </div>
</div>

<script>
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    if (localStorage.getItem('theme') === 'dark') html.setAttribute('data-theme', 'dark');
    themeBtn.onclick = () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        isDark ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    };
</script>
<script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    const picker = document.getElementById('picker');
    const alphaRange = document.getElementById('alphaRange');
    const colorLayer = document.getElementById('colorLayer');
    
    const hexEl = document.getElementById('hex');
    const rgbaEl = document.getElementById('rgba');
    const hslaEl = document.getElementById('hsla');
    const alphaLabel = document.getElementById('alphaLabel');

    function updateColors() {
        const hexBase = picker.value.toUpperCase();
        const alphaPercent = alphaRange.value;
        const alphaDecimal = (alphaPercent / 100).toFixed(2);
        const alphaHex = Math.round(alphaPercent * 2.55).toString(16).padStart(2, '0').toUpperCase();

        // 顯示
        alphaLabel.innerText = alphaPercent + "%";
        colorLayer.style.backgroundColor = hexBase + alphaHex;

        // HEX (8碼)
        hexEl.innerText = hexBase + alphaHex;

        // RGBA
        const r = parseInt(hexBase.slice(1, 3), 16);
        const g = parseInt(hexBase.slice(3, 5), 16);
        const b = parseInt(hexBase.slice(5, 7), 16);
        rgbaEl.innerText = `rgba(${r}, ${g}, ${b}, ${alphaDecimal})`;

        // HSLA
        hslaEl.innerText = rgbToHsla(r, g, b, alphaDecimal);
    }

    function rgbToHsla(r, g, b, a) {
        r /= 255, g /= 255, b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return `hsla(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%, ${a})`;
    }

    function copy(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        const btn = event.target;
        btn.innerText = "OK!";
        setTimeout(() => btn.innerText = "複製", 1000);
    }

    picker.oninput = updateColors;
    alphaRange.oninput = updateColors;
    updateColors(); // 初始化
</script>
</body>
</html>
